test_environment:
  database: ":memory: (SQLite)"
  foreign_keys_enabled: true
  test_user_model: "YourVendor\\Blog\\Tests\\TestUser"
  migrations_run_manually: true

commands:
  all_tests: "./vendor/bin/pest --no-coverage"
  unit_only: "./vendor/bin/pest tests/Unit/ --no-coverage"
  feature_only: "./vendor/bin/pest tests/Feature/ --no-coverage"
  specific_file: "./vendor/bin/pest tests/Unit/Models/BlogPostTest.php --no-coverage"
  with_coverage: "./vendor/bin/pest --coverage"

test_utilities:
  test_case: tests/TestCase.php
  factories: database/factories/
  seeders: database/seeders/BlogSeeder.php

test_helpers:
  create_user: "$this->createUser(['can_blog' => true])"
  create_admin: "$this->createAdmin()"
  unique_emails: "Uses static counter for unique test emails"

common_assertions:
  translations: "$post->getTranslations('title')->toBe(['en' => 'Title'])"
  relationships: "$post->relationLoaded('author')->toBeTrue()"
  database: "$this->assertDatabaseHas('blog_posts', ['slug' => 'test'])"
